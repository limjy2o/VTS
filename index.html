<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="page-home">
    <div class="container">
        <div class="header">
            <h1>VTS</h1>
            <button class="theme-toggle" onclick="toggleTheme()">切換深色/淺色模式</button>
        </div>
        <div id="message" class="message"></div>

        <div class="section">
            <div class="section-title">題庫管理</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p style="margin-bottom:10px;">點擊上傳題庫檔案</p>
                <p style="font-size:0.9rem;opacity:0.7;">支援 .txt 格式（Tab 分隔：單字、詞性、中文解釋）</p>
                <input type="file" id="fileInput" accept=".txt" multiple onchange="uploadBanks(event)">
            </div>
            <div id="bankList"></div>
        </div>

        <div id="quizSetup" style="display:none;">
            <div class="section">
                <div class="section-title">題庫選擇</div>
                <p style="margin-bottom:15px;font-weight:bold;">選擇要使用的題庫:</p>
                <div class="checkbox-group" id="bankCheckboxGroup"></div>
                <p style="margin-top:20px;margin-bottom:15px;font-weight:bold;">題數選擇:</p>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="count_mode" value="30" checked
                               onchange="toggleCustomInput();updateQuestionCount()"> 30 題
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="count_mode" value="40"
                               onchange="toggleCustomInput();updateQuestionCount()"> 40 題
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="count_mode" value="50"
                               onchange="toggleCustomInput();updateQuestionCount()"> 50 題
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="count_mode" value="custom"
                               onchange="toggleCustomInput();updateQuestionCount()">
                        自訂:
                        <input type="number" id="customCount" class="custom-input" value="100" min="1"
                               disabled onclick="selectCustomMode(event)" oninput="updateQuestionCount()"> 題
                    </label>
                </div>
                <p id="totalCountText" class="info-text"></p>
            </div>

            <div class="section">
                <div class="section-title">測驗模式</div>
                <p style="margin-bottom:15px;font-weight:bold;">選擇測驗模式:</p>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="test_mode" value="A" checked> 中文解釋及詞性測驗</label>
                    <label class="radio-label"><input type="radio" name="test_mode" value="B"> 拼字測驗</label>
                    <label class="radio-label"><input type="radio" name="test_mode" value="C"> 混合模式</label>
                </div>
            </div>

            <div class="start-button">
                <button class="btn btn-large" onclick="startQuiz()">開始測驗</button>
            </div>
        </div>
    </div>
</div>

<script src="common.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
// 儲存層：IndexedDB（主要）＋ localStorage（備援，雙重寫入）
// ════════════════════════════════════════════════════════════════════

const DB_NAME  = 'vts_db';
const DB_STORE = 'banks';
const DB_KEY   = 'all';
const LS_KEY   = 'vts_banks';
let _db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (_db) { resolve(_db); return; }
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
        req.onsuccess       = e => { _db = e.target.result; resolve(_db); };
        req.onerror         = e => reject(e.target.error);
        req.onblocked       = () => reject(new Error('IndexedDB blocked'));
    });
}

function idbSave(banks) {
    return new Promise(async (resolve) => {
        try {
            const db = await openDB();
            const tx = db.transaction(DB_STORE, 'readwrite');
            tx.objectStore(DB_STORE).put(banks, DB_KEY);
            tx.oncomplete = () => resolve(true);
            tx.onerror    = e => { console.warn('[IDB] save error', e.target.error); resolve(false); };
        } catch (e) { console.warn('[IDB] save failed', e); resolve(false); }
    });
}

function idbLoad() {
    return new Promise(async (resolve) => {
        try {
            const db  = await openDB();
            const tx  = db.transaction(DB_STORE, 'readonly');
            const req = tx.objectStore(DB_STORE).get(DB_KEY);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror   = () => { console.warn('[IDB] load error'); resolve(null); };
        } catch (e) { console.warn('[IDB] load failed', e); resolve(null); }
    });
}

function lsSave(banks) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(banks)); return true; }
    catch (e) { console.warn('[LS] save failed', e); return false; }
}

function lsLoad() {
    try {
        const raw = localStorage.getItem(LS_KEY);
        return raw ? JSON.parse(raw) : null;
    } catch (e) { console.warn('[LS] load failed', e); return null; }
}

async function saveBanksToDB(banks) {
    const idbOk = await idbSave(banks);
    const lsOk  = lsSave(banks);
    console.log(`[Storage] save — IDB:${idbOk} LS:${lsOk}`);
}

async function loadBanksFromDB() {
    const [idbData, lsData] = await Promise.all([idbLoad(), Promise.resolve(lsLoad())]);
    const idbKeys = idbData ? Object.keys(idbData).length : 0;
    const lsKeys  = lsData  ? Object.keys(lsData).length  : 0;
    console.log(`[Storage] load — IDB:${idbKeys} keys, LS:${lsKeys} keys`);

    if (idbKeys === 0 && lsKeys === 0) return {};

    const winner = (lsKeys > idbKeys) ? lsData : (idbData || lsData);

    if (idbKeys === 0 && lsKeys > 0) idbSave(winner);
    if (lsKeys  === 0 && idbKeys > 0) lsSave(winner);

    return winner || {};
}

// ════════════════════════════════════════════════════════════════════
// 全域狀態
// ════════════════════════════════════════════════════════════════════

const STATE = { banks: {} };

// ════════════════════════════════════════════════════════════════════
// 通知訊息
// ════════════════════════════════════════════════════════════════════

function showMessage(text) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message show';
    setTimeout(() => el.classList.remove('show'), 5000);
}

// ════════════════════════════════════════════════════════════════════
// .txt 解析器
// ════════════════════════════════════════════════════════════════════

const MONTH_MAP = {
    '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6,
    '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12,
};

function parseTxt(text) {
    const lines     = text.split(/\r?\n/);
    const questions = [];
    let volume = '', lesson = '', isMagazine = false, magMonth = '';

    for (const raw of lines) {
        const line  = raw.trim();
        if (!line) continue;

        const parts = line.split('\t');

        if (parts.length >= 3 && parts[0].trim() && parts[2].trim()) {
            const src = (volume + (lesson ? ' ' + lesson : '')).trim();
            const srcResult = isMagazine && magMonth
                ? (magMonth + (lesson ? ' ' + lesson : '')).trim()
                : src;
            questions.push({
                word: parts[0].trim(), pos: parts[1].trim(), meaning: parts[2].trim(),
                _source: src, _sourceResult: srcResult,
            });
            continue;
        }

        const vm1  = line.match(/^(\d+-\d+)/);
        const vm3  = line.match(/^Level\s*(\d+)/i);
        const vm2a = line.match(/^(\d+)月雜誌/);
        const vm2b = line.match(/^([一二三四五六七八九十]+)月雜誌/);
        const lm   = line.match(/(?<![A-Za-z])L(\d+)/);
        const wm   = line.match(/\bW(\d+)\b/);

        if (vm1)  { volume = vm1[1];           lesson = ''; isMagazine = false; magMonth = ''; }
        if (vm3)  { volume = 'Level' + vm3[1]; lesson = ''; isMagazine = false; magMonth = ''; }
        if (vm2a) {
            magMonth = String(parseInt(vm2a[1])).padStart(2, '0');
            volume = vm2a[1] + '月雜誌'; lesson = ''; isMagazine = true;
        } else if (vm2b) {
            magMonth = String(MONTH_MAP[vm2b[1]] || 0).padStart(2, '0');
            volume = vm2b[1] + '月雜誌'; lesson = ''; isMagazine = true;
        }
        if (lm) lesson = 'L' + lm[1];
        if (wm) lesson = 'W' + wm[1];
    }
    return questions;
}

// ════════════════════════════════════════════════════════════════════
// 題庫上傳 & 管理
// ════════════════════════════════════════════════════════════════════

async function uploadBanks(event) {
    const files = Array.from(event.target.files);
    if (!files.length) return;

    let loaded = 0;
    for (const file of files) {
        const text = await file.text();
        const name = file.name.replace(/\.txt$/i, '');
        const qs   = parseTxt(text);
        if (qs.length > 0) { STATE.banks[name] = qs; loaded++; }
    }

    await saveBanksToDB(STATE.banks);
    renderBankList();
    showMessage(loaded > 0 ? `成功載入 ${loaded} 個題庫` : '檔案格式錯誤');
    event.target.value = '';
}

function renderBankList() {
    const names   = Object.keys(STATE.banks);
    const listEl  = document.getElementById('bankList');
    const setupEl = document.getElementById('quizSetup');
    const cbGroup = document.getElementById('bankCheckboxGroup');

    if (names.length === 0) {
        listEl.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.7;">尚未上傳任何題庫</p>';
        setupEl.style.display = 'none';
        return;
    }

    const container = document.createElement('div');
    container.className = 'bank-list';
    names.forEach(name => {
        const item  = document.createElement('div');
        item.className = 'bank-item';
        const label = document.createElement('span');
        label.textContent = `${name} (${STATE.banks[name].length} 題)`;
        const btn   = document.createElement('button');
        btn.className   = 'btn btn-danger';
        btn.textContent = '刪除';
        btn.addEventListener('click', () => deleteBank(name));
        item.appendChild(label);
        item.appendChild(btn);
        container.appendChild(item);
    });
    listEl.innerHTML = '';
    listEl.appendChild(container);

    cbGroup.innerHTML = names.map(name => `
        <label class="checkbox-label">
            <input type="checkbox" name="bank" value="${h(name)}" onchange="onBankCheckChange(this)">
            ${h(name)} (${STATE.banks[name].length} 題)
        </label>`
    ).join('');

    setupEl.style.display = 'block';
    toggleCustomInput();
    updateQuestionCount();
}

async function deleteBank(name) {
    if (!confirm(`確定要刪除題庫「${name}」嗎？`)) return;
    delete STATE.banks[name];
    await saveBanksToDB(STATE.banks);
    renderBankList();
    showMessage(`題庫 ${name} 已刪除`);
}

function onBankCheckChange(cb) {
    cb.closest('.checkbox-label').classList.toggle('selected', cb.checked);
    updateQuestionCount();
}

// ════════════════════════════════════════════════════════════════════
// 題數 / 模式 UI
// ════════════════════════════════════════════════════════════════════

function toggleCustomInput() {
    const radio = document.querySelector('input[name="count_mode"][value="custom"]');
    const input = document.getElementById('customCount');
    if (!input) return;
    radio && radio.checked
        ? input.removeAttribute('disabled')
        : input.setAttribute('disabled', 'disabled');
}

function selectCustomMode(e) {
    e.stopPropagation();
    document.querySelector('input[name="count_mode"][value="custom"]').checked = true;
    toggleCustomInput();
    updateQuestionCount();
}

function updateQuestionCount() {
    const selected = getSelectedBankNames();
    const el       = document.getElementById('totalCountText');
    if (!el) return;
    if (!selected.length) { el.textContent = ''; return; }

    const total  = selected.reduce((s, n) => s + (STATE.banks[n]?.length || 0), 0);
    const mode   = document.querySelector('input[name="count_mode"]:checked')?.value || '30';
    const actual = mode === 'custom'
        ? Math.min(parseInt(document.getElementById('customCount').value) || 0, total)
        : Math.min(parseInt(mode), total);

    el.textContent = `已選題庫總題數: ${total} 題 → 將抽取 ${actual} 題`;
}

function getSelectedBankNames() {
    return Array.from(document.querySelectorAll('input[name="bank"]:checked'))
                .map(cb => cb.value);
}

// ════════════════════════════════════════════════════════════════════
// 開始測驗：組好題目後交給 quiz.html（透過 sessionStorage 傳遞）
// ════════════════════════════════════════════════════════════════════

function startQuiz() {
    const selected = getSelectedBankNames();
    if (!selected.length) { showMessage('請至少選擇一個題庫'); return; }

    const countMode = document.querySelector('input[name="count_mode"]:checked')?.value || '30';
    const testMode  = document.querySelector('input[name="test_mode"]:checked')?.value  || 'A';

    let all = [];
    for (const n of selected) if (STATE.banks[n]) all = all.concat(STATE.banks[n]);

    let count;
    if (countMode === 'custom') {
        count = parseInt(document.getElementById('customCount').value);
        if (isNaN(count) || count < 1) { showMessage('請輸入有效的題數（至少 1 題）'); return; }
        count = Math.min(count, all.length);
    } else {
        count = Math.min(parseInt(countMode), all.length);
    }

    shuffle(all);
    const quizQuestions = all.slice(0, count).map(q => ({
        ...q,
        mode: testMode === 'C' ? (Math.random() < 0.5 ? 'A' : 'B') : testMode,
    }));

    sessionStorage.setItem('vts_quiz', JSON.stringify({
        questions: quizQuestions,
        startTime: Date.now(),
    }));
    window.location.href = 'quiz.html';
}

// ════════════════════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════════════════════

loadBanksFromDB().then(banks => {
    STATE.banks = banks;
    renderBankList();
});
</script>
</body>
</html>
