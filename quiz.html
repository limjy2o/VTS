<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="page-quiz">
    <div class="quiz-header">
        <div class="quiz-header-left">
            <h1>VTS</h1>
            <span id="quizProgressInfo" class="progress-info"></span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">切換主題</button>
    </div>
    <div class="quiz-body" id="quizBody"></div>
    <div class="button-container">
        <button class="btn" onclick="window.location.href='index.html'">返回主頁</button>
        <button class="btn btn-primary" onclick="submitQuiz()">提交答案</button>
    </div>
</div>

<script src="common.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
// 讀取測驗資料（由 index.html 透過 sessionStorage 傳入）
// ════════════════════════════════════════════════════════════════════

const QUIZ_DATA = JSON.parse(sessionStorage.getItem('vts_quiz') || 'null');
if (!QUIZ_DATA || !QUIZ_DATA.questions || !QUIZ_DATA.questions.length) {
    window.location.href = 'index.html';
}

const STATE = {
    quizQuestions: QUIZ_DATA ? QUIZ_DATA.questions : [],
    quizStartTime: QUIZ_DATA ? QUIZ_DATA.startTime  : Date.now(),
};

// ════════════════════════════════════════════════════════════════════
// 渲染測驗題目
// ════════════════════════════════════════════════════════════════════

function renderQuiz() {
    const qs = STATE.quizQuestions;
    document.getElementById('quizProgressInfo').textContent = `共 ${qs.length} 題`;
    document.getElementById('quizBody').innerHTML = qs.map((q, i) => buildQuestionCard(q, i)).join('');
}

function buildQuestionCard(q, i) {
    const srcLabel = (q._source || '').trim();
    const srcHtml  = srcLabel ? `<span class="question-source">${h(srcLabel)}</span>` : '';

    if (q.mode === 'A') {
        const posList    = q.pos.split('&');
        const posInputs  = posList.map((_, j) =>
            `${j > 0 ? '<span class="separator">&amp;</span>' : ''}` +
            `<input type="text" class="input-field input-small"
                    data-q="${i}" data-field="pos" data-idx="${j}"
                    placeholder="詞性 ${j + 1}" autocomplete="off">`
        ).join('');

        let mIdx = 0;
        const meaningRows = q.meaning.split('&').map((part, pi) => {
            const subs = part.split('、').map((_, si) => {
                const idx = mIdx++;
                return `${si > 0 ? '<span class="separator">、</span>' : ''}` +
                    `<input type="text" class="input-field input-small"
                            data-q="${i}" data-field="meaning" data-idx="${idx}"
                            placeholder="解釋 ${idx + 1}" autocomplete="off">`;
            }).join('');
            return `<div class="input-row">${pi > 0 ? '<span class="separator">&amp;</span>' : ''}${subs}</div>`;
        }).join('');

        return `
        <div class="question-card" data-mode="A">
            <div class="question-header">
                <span class="question-number">${i + 1}.</span>${srcHtml}
            </div>
            <div class="question-content">
                <div class="field-group">
                    <div class="field-label">單字</div>
                    <div class="field-content"><span class="word-display">${h(q.word)}</span></div>
                </div>
                <div class="field-group">
                    <div class="field-label">詞性</div>
                    <div class="field-content"><div class="input-group"><div class="input-row">${posInputs}</div></div></div>
                </div>
                <div class="field-group">
                    <div class="field-label">中文解釋</div>
                    <div class="field-content"><div class="input-group">${meaningRows}</div></div>
                </div>
            </div>
        </div>`;
    } else {
        const posHtml = q.pos.split('&').map((p, j) =>
            `${j > 0 ? '<span class="separator">&amp;</span>' : ''}<span>${h(p.trim())}</span>`
        ).join('');

        const meaningHtml = q.meaning.split('&').map((part, pi) => {
            const inner = part.split('、').map((s, si) =>
                `${si > 0 ? '<span class="separator">、</span>' : ''}<span>${h(s.trim())}</span>`
            ).join('');
            return `<div class="input-row">${pi > 0 ? '<span class="separator">&amp;</span>' : ''}${inner}</div>`;
        }).join('');

        return `
        <div class="question-card" data-mode="B">
            <div class="question-header">
                <span class="question-number">${i + 1}.</span>${srcHtml}
            </div>
            <div class="question-content">
                <div class="field-group">
                    <div class="field-label">單字</div>
                    <div class="field-content">
                        <input type="text" class="input-field"
                               data-q="${i}" data-field="word"
                               placeholder="輸入單字拼寫" autocomplete="off">
                    </div>
                </div>
                <div class="field-group">
                    <div class="field-label">詞性</div>
                    <div class="field-content"><div class="input-row">${posHtml}</div></div>
                </div>
                <div class="field-group">
                    <div class="field-label">中文解釋</div>
                    <div class="field-content"><div class="input-group">${meaningHtml}</div></div>
                </div>
            </div>
        </div>`;
    }
}

// ════════════════════════════════════════════════════════════════════
// Enter 鍵導航 / Backspace 返回上一題
// ════════════════════════════════════════════════════════════════════

function getQuizInputs() {
    const inputs = [];
    document.querySelectorAll('#quizBody .question-card').forEach(card => {
        ['word', 'pos', 'meaning'].forEach(field => {
            const els = Array.from(card.querySelectorAll(`input[data-field="${field}"]`));
            els.sort((a, b) => (parseInt(a.dataset.idx) || 0) - (parseInt(b.dataset.idx) || 0));
            inputs.push(...els);
        });
    });
    return inputs;
}

function alignCardTop(inp) {
    const card = inp.closest('.question-card');
    if (!card) return;
    const headerH = document.querySelector('.quiz-header')?.offsetHeight || 0;
    const top = card.getBoundingClientRect().top + window.scrollY - headerH - 16;
    window.scrollTo({ top, behavior: 'smooth' });
}

function focusQuizInput(inp) {
    inp.focus();
    alignCardTop(inp);
}

document.getElementById('quizBody').addEventListener('focusin', function (e) {
    const inp = e.target;
    if (!inp.matches('input.input-field')) return;
    alignCardTop(inp);
    setTimeout(() => alignCardTop(inp), 350);
});

document.addEventListener('keydown', function (e) {
    const active = document.activeElement;
    if (!active || !active.closest('#quizBody')) return;

    if (e.key === 'Enter') {
        e.preventDefault();
        const inputs = getQuizInputs();
        const idx    = inputs.indexOf(active);
        if (idx === -1) return;

        if (idx < inputs.length - 1) {
            focusQuizInput(inputs[idx + 1]);
        } else {
            submitQuiz();
        }
        return;
    }

    if (e.key === 'Backspace') {
        if (active.value !== '') return;

        const inputs = getQuizInputs();
        const idx    = inputs.indexOf(active);
        if (idx <= 0) return;

        e.preventDefault();
        focusQuizInput(inputs[idx - 1]);
    }
});

// ════════════════════════════════════════════════════════════════════
// 提交 & 批改
// ════════════════════════════════════════════════════════════════════

function submitQuiz() {
    const qs        = STATE.quizQuestions;
    const totalTime = Math.round((Date.now() - STATE.quizStartTime) / 1000);
    const cards     = document.getElementById('quizBody').querySelectorAll('.question-card');
    const results   = [];
    let correctCount = 0;

    qs.forEach((q, i) => {
        const card = cards[i];
        if (q.mode === 'A') {
            const userPosList     = Array.from(card.querySelectorAll('input[data-field="pos"]')).map(el => el.value.trim());
            const userMeaningList = Array.from(card.querySelectorAll('input[data-field="meaning"]')).map(el => el.value.trim());
            const correct = checkAnswerA(q, userPosList, userMeaningList);
            if (correct) correctCount++;
            results.push({ mode: 'A', question: q, userPosList, userMeaningList, correct, source: q._source || '' });
        } else {
            const wordEl  = card.querySelector('input[data-field="word"]');
            const userWord = wordEl ? wordEl.value.trim() : '';
            const correct  = q.word.trim().toLowerCase() === userWord.toLowerCase();
            if (correct) correctCount++;
            results.push({ mode: 'B', question: q, userWord, correct, source: q._source || '' });
        }
    });

    sessionStorage.setItem('vts_result', JSON.stringify({ results, correctCount, totalTime }));
    sessionStorage.removeItem('vts_quiz');
    window.location.href = 'result.html';
}

function checkAnswerA(q, userPosList, userMeaningList) {
    const correctPos     = new Set(q.pos.split('&').map(p => p.trim()).filter(Boolean));
    const correctMeaning = new Set(q.meaning.split('&').map(m => m.trim()).filter(Boolean));
    const userPos        = new Set(userPosList.filter(Boolean));
    const userMeaning    = new Set(userMeaningList.filter(Boolean));
    return setsEqual(userPos, correctPos) && setsEqual(userMeaning, correctMeaning);
}

// ════════════════════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════════════════════

if (QUIZ_DATA) {
    renderQuiz();
    setTimeout(() => {
        const first = getQuizInputs()[0];
        if (first) first.focus();
    }, 50);
}
</script>
</body>
</html>
